# Kitty config — P10k Velvet theme
# Auto-installed by choose-profile.sh → ~/.config/kitty/kitty.conf

# Font
font_family      FiraCode Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0

# Colors
background #0E050F
foreground #EFDCF9
cursor     #EFDCF9
cursor_text_color #0E050F
selection_background #69307A
selection_foreground #EFDCF9

# ANSI palette — Velvet/Sakura
color0  #0E050F
color1  #FF3C3C
color2  #8EC07C
color3  #E4F34A
color4  #7FD5EA
color5  #69307A
color6  #8EC07C
color7  #EFDCF9
color8  #341948
color9  #FF5555
color10 #A5D793
color11 #EEF86F
color12 #96E0F4
color13 #87479B
color14 #A5D793
color15 #F9E9FF

# Window
window_padding_width 8
hide_window_decorations no

# Tab bar
tab_bar_style powerline
tab_powerline_style slanted
active_tab_background #69307A
active_tab_foreground #EFDCF9
inactive_tab_background #170B3B
inactive_tab_foreground #EFDCF9

# Misc
enable_audio_bell no
