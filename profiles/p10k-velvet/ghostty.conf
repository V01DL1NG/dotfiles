# Ghostty config — P10k Velvet theme
# Auto-installed by choose-profile.sh → ~/.config/ghostty/config

# Font
font-family = FiraCode Nerd Font
font-size = 13

# Colors (no # prefix)
background = 0E050F
foreground = EFDCF9
cursor-color = EFDCF9
selection-background = 69307A
selection-foreground = EFDCF9

# ANSI palette — Velvet/Sakura
palette = 0=0E050F
palette = 1=FF3C3C
palette = 2=8EC07C
palette = 3=E4F34A
palette = 4=7FD5EA
palette = 5=69307A
palette = 6=8EC07C
palette = 7=EFDCF9
palette = 8=341948
palette = 9=FF5555
palette = 10=A5D793
palette = 11=EEF86F
palette = 12=96E0F4
palette = 13=87479B
palette = 14=A5D793
palette = 15=F9E9FF

# Window
window-padding-x = 8
window-padding-y = 8
window-decoration = true

# Shell integration
shell-integration = detect
