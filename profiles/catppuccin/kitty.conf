# Kitty config — Catppuccin Mocha theme
# Auto-installed by choose-profile.sh → ~/.config/kitty/kitty.conf

# Font
font_family      FiraCode Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0

# Colors — Catppuccin Mocha
background #1E1E2E
foreground #CDD6F4
cursor     #F5E0DC
cursor_text_color #1E1E2E
selection_background #585B70
selection_foreground #CDD6F4

# ANSI palette — Catppuccin Mocha
color0  #45475A
color1  #F38BA8
color2  #A6E3A1
color3  #F9E2AF
color4  #89B4FA
color5  #CBA6F7
color6  #89DCEB
color7  #BAC2DE
color8  #6C7086
color9  #F38BA8
color10 #A6E3A1
color11 #F9E2AF
color12 #89B4FA
color13 #CBA6F7
color14 #89DCEB
color15 #CDD6F4

# Window
window_padding_width 8
hide_window_decorations no

# Tab bar
tab_bar_style powerline
tab_powerline_style slanted
active_tab_background #CBA6F7
active_tab_foreground #1E1E2E
inactive_tab_background #313244
inactive_tab_foreground #CDD6F4

# Misc
enable_audio_bell no
