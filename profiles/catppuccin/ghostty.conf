# Ghostty config — Catppuccin Mocha theme
# Auto-installed by choose-profile.sh → ~/.config/ghostty/config

# Font
font-family = FiraCode Nerd Font
font-size = 13

# Colors (no # prefix) — Catppuccin Mocha
background = 1E1E2E
foreground = CDD6F4
cursor-color = F5E0DC
selection-background = 585B70
selection-foreground = CDD6F4

# ANSI palette — Catppuccin Mocha
palette = 0=45475A
palette = 1=F38BA8
palette = 2=A6E3A1
palette = 3=F9E2AF
palette = 4=89B4FA
palette = 5=CBA6F7
palette = 6=89DCEB
palette = 7=BAC2DE
palette = 8=6C7086
palette = 9=F38BA8
palette = 10=A6E3A1
palette = 11=F9E2AF
palette = 12=89B4FA
palette = 13=CBA6F7
palette = 14=89DCEB
palette = 15=CDD6F4

# Window
window-padding-x = 8
window-padding-y = 8
window-decoration = true

# Shell integration
shell-integration = detect
