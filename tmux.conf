# =============================================================================
# Prefix
# =============================================================================
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# =============================================================================
# General
# =============================================================================
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm*:Tc"  # true color (24-bit RGB) passthrough
set -s escape-time 0           # no delay on Escape (vim-friendly)
set -g history-limit 10000     # scrollback buffer
set -g base-index 1            # 1-indexed windows
setw -g pane-base-index 1      # 1-indexed panes
set -g renumber-windows on     # renumber on close

# =============================================================================
# Mouse
# =============================================================================
set -g mouse on

# Wheel scrolling: pass through to alternate-screen apps (vim, less),
# otherwise enter copy mode and scroll normally
bind -n WheelUpPane \
  if-shell -F -t = "#{alternate_on}" \
    "send-keys -M" \
    "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane \
  if-shell -F -t = "#{alternate_on}" \
    "send-keys -M" \
    "select-pane -t=; send-keys -M"

# =============================================================================
# Status bar (sakura/velvet theme)
# =============================================================================
set -g status-style "bg=#170B3B,fg=#EFDCF9"
set -g status-left "#[bg=#69307A,fg=#EFDCF9,bold]  #S #[bg=#170B3B,fg=#69307A]\ue0b4"
set -g status-left-length 25
set -g status-right "#[fg=#341948]\ue0b6#[bg=#341948,fg=#EFDCF9] #($HOME/.tmux/now-playing.sh) #[fg=#4c1f5e]\ue0b6#[bg=#4c1f5e,fg=#EFDCF9]  %H:%M "
set -g status-right-length 70
set -g status-interval 5
set -g status-justify left
setw -g window-status-style "fg=#EFDCF9,dim"
setw -g window-status-format "  #{window_index} #{b:pane_current_path} "
setw -g window-status-current-style "bold"
setw -g window-status-current-format "#[fg=#170B3B,bg=#4c1f5e]\ue0b4#[fg=#EFDCF9,bg=#4c1f5e,bold] #{window_index} #{b:pane_current_path} #[fg=#4c1f5e,bg=#170B3B]\ue0b4"
set -g message-style "bg=#4c1f5e,fg=#EFDCF9"
set -g message-command-style "bg=#341948,fg=#EFDCF9"
set -g mode-style "bg=#69307A,fg=#EFDCF9"

# =============================================================================
# Pane borders
# =============================================================================
set -g pane-border-style "fg=#341948"
set -g pane-active-border-style "fg=#69307A"
set -g pane-border-lines double
set -g pane-border-status top
set -g pane-border-format "#[fg=#69307A,bold] #{pane_index} #[fg=#EFDCF9,nobold]#{pane_current_command} "

# =============================================================================
# Split panes (intuitive keys)
# =============================================================================
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# =============================================================================
# Pane navigation (vim-style)
# =============================================================================
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# =============================================================================
# Reload config
# =============================================================================
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# =============================================================================
# Copy mode (vi keys + pbcopy)
# =============================================================================
setw -g mode-keys vi
bind [ copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
bind ] run "pbpaste | tmux load-buffer - && tmux paste-buffer"
set -s set-clipboard on

# =============================================================================
# Plugins (TPM)
# =============================================================================

# Session persistence across reboots
set -g @plugin 'tmux-plugins/tpm'

# Source personal overrides if present (generated by tmux-config.sh)
if "test -f ~/.tmux.conf.local" "source-file ~/.tmux.conf.local"

# Source personal plugin declarations if present (generated by tmux-config.sh)
if "test -f ~/.tmux.conf.plugins" "source-file ~/.tmux.conf.plugins"

# Bootstrap TPM if not installed
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TPM (keep at very bottom)
run '~/.tmux/plugins/tpm/tpm'
